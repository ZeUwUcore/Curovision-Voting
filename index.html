<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curovision Voting</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>
    <style>
        .hidden { display: none !important; }
        
        #recap-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.98);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10000;
        }

        #recap-video {
            width: 90vw;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            border: 2px solid #00d2ff;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            margin: 20px 0;
        }

        .drag-handle {
            cursor: grab;
            margin-right: 15px;
            color: #00d2ff;
            font-size: 1.4em;
            display: flex;
            align-items: center;
            user-select: none;
            padding: 0 5px;
        }
        .drag-handle:active { cursor: grabbing; }

        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(to bottom, #1a1a2e, #16213e); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 600px; text-align: center; }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .title-logo { height: 60px; width: auto; }
        
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; color: black; }
        button { background: #00d2ff; color: #121212; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #555; color: #aaa; }

        #song-list { margin-top: 20px; text-align: left; touch-action: pan-y; }
        .song-item { 
            background: rgba(255, 255, 255, 0.1); 
            margin: 8px 0; padding: 15px; 
            border-radius: 10px; 
            display: flex; align-items: center; 
            border-left: 5px solid #00d2ff; 
            position: relative; 
        }
        .rank-number { margin-right: 15px; font-weight: bold; color: #00d2ff; width: 20px; }
        .song-info { flex-grow: 1; overflow: hidden; }
        .song-info strong { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .points-badge { margin-left: 10px; color: #121212; font-weight: bold; padding: 5px 10px; border-radius: 5px; background: #00ff88; min-width: 60px; text-align: center; }
        .sortable-ghost { opacity: 0.3; background: #00d2ff; }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 12px; margin-bottom: 10px;">
            <span id="status-dot" style="height: 10px; width: 10px; border-radius: 50%; display: inline-block; background-color: gray;"></span>
            <span id="status-text">Initialisiere...</span>
        </div>

        <div class="header-container">
            <img src="logo.png" alt="Logo" class="title-logo">
            <h1>CUROVISION</h1>
            <img src="logo.png" alt="Logo" class="title-logo">
        </div>
        
        <div id="login-area">
            <h3 id="mode-title">Lade...</h3>
            <input type="text" id="username" placeholder="Dein Name">
            <input type="password" id="userpassword" class="hidden" placeholder="Dein Passwort">
            <br><br>
            <button onclick="startVoting()">Anmelden & Starten</button>
        </div>

        <div id="voting-area" class="hidden">
            <h3>Hallo <span id="display-name"></span>!</h3>
            <p>Nutze das ☰ Symbol, um deine Favoriten zu sortieren:</p>
            <div id="song-list"></div>
            <button id="submit-btn" onclick="submitVoting()" style="background: #00ff88; margin-top: 30px; width: 100%; color: black;">Voting final absenden</button>
        </div>
    </div>

    <div id="recap-overlay" class="hidden">
        <h1 style="color: #00d2ff;">🎬 SCHNELLDURCHGANG</h1>
        <p>Gleich geht's los! Schau dir kurz die Zusammenfassung an.</p>
        <iframe id="recap-video" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        <button id="close-recap-btn" onclick="closeRecap()" disabled>Bitte warten... (<span id="recap-timer">30</span>s)</button>
    </div>

    <script>
    const SUPABASE_URL = 'https://gvrzwwobfgrrsdzqwcdy.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2cnp3d29iZmdycnNkenF3Y2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTc3NDksImV4cCI6MjA5MDc5Mzc0OX0.GJHIJD5IEaFD5Q1zPhTRSLr7-EoJhj5ZIqyi4vJJfSY';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentMode = '';
    let loggedInUserId = null;
    let recapInterval;
    let recapTimeLeft = 30;

    async function initApp() {
        const { data } = await supabaseClient.from('config').select('value').eq('key', 'voting_status').single();
        if (data) {
            currentMode = data.value;
            document.getElementById('status-dot').style.backgroundColor = "#00ff88";
            document.getElementById('status-text').innerText = "Bereit (" + currentMode.toUpperCase() + ")";
            document.getElementById('mode-title').innerText = currentMode === 'pre' ? "PRE-VOTING" : "LIVE-VOTING";
            if(currentMode === 'pre') document.getElementById('userpassword').classList.remove('hidden');
        }
    }

    async function startVoting() {
        const name = document.getElementById('username').value;
        if(!name) return alert("Bitte Namen eingeben!");
        if(currentMode === 'pre') {
            const pass = document.getElementById('userpassword').value;
            const { data } = await supabaseClient.from('participants').select('*').eq('name', name).eq('password', pass).single();
            if (!data) return alert("Login falsch!");
            if (data.vote_status === 'yes') return alert("Bereits abgestimmt!");
            loggedInUserId = data.id;
            showRecap();
        } else { proceedToVoting(name); }
    }

    function showRecap() {
        const overlay = document.getElementById('recap-overlay');
        const iframe = document.getElementById('recap-video');
        const btn = document.getElementById('close-recap-btn');
        iframe.src = "https://www.youtube.com/embed/5eZonu8XsEs?autoplay=1";
        overlay.classList.remove('hidden');
        recapInterval = setInterval(() => {
            recapTimeLeft--;
            document.getElementById('recap-timer').innerText = recapTimeLeft;
            if (recapTimeLeft <= 0) {
                clearInterval(recapInterval);
                btn.disabled = false;
                btn.innerText = "Verstanden! Zum Voting";
                btn.style.background = "#00ff88";
            }
        }, 1000);
    }

    function closeRecap() {
        document.getElementById('recap-overlay').classList.add('hidden');
        document.getElementById('recap-video').src = "";
        proceedToVoting(document.getElementById('username').value);
    }

    function proceedToVoting(name) {
        document.getElementById('login-area').classList.add('hidden');
        document.getElementById('voting-area').classList.remove('hidden');
        document.getElementById('display-name').innerText = name;
        loadSongs();
    }

    async function loadSongs() {
    const { data: songs } = await supabaseClient.from('songs').select('*');
    const list = document.getElementById('song-list');
    list.innerHTML = '';
    
    let filtered = songs.filter(s => Number(s.id) !== Number(loggedInUserId));
    filtered.sort(() => Math.random() - 0.5);

    filtered.forEach((s, i) => {
        const item = document.createElement('div');
        item.className = 'song-item';
        item.setAttribute('data-id', s.id);

        let flagHtml = '';
        if (currentMode !== 'pre' && s.country) {
            flagHtml = `<span class="fi fi-${s.country.toLowerCase()}"></span> `;
        }

        // UNTERSCHIEDLICHE ANZEIGE: Pre-Voting zeigt Rang, Live-Voting zeigt Punkte
        const livePoints = [15, 10, 8, 7, 6, 5, 4, 3, 2, 1];
        const displayLabel = (currentMode === 'live') ? `${livePoints[i] || 0} Pkt.` : `Rang ${i + 1}`;

        item.innerHTML = `
            <div class="drag-handle">☰</div>
            <span class="rank-number">${i+1}</span>
            <div class="song-info">
                <strong>${s.title}</strong>
                <small>${flagHtml}${s.artist}</small>
            </div>
            <div class="points-badge">${displayLabel}</div>
        `;
        list.appendChild(item);
    });

    new Sortable(list, { 
        animation: 150, 
        handle: '.drag-handle',
        ghostClass: 'sortable-ghost',
        onEnd: updateBadges 
    });
}

function updateBadges() {
    const livePoints = [15, 12, 10, 8, 7, 6, 5, 4, 3, 2];
    document.querySelectorAll('.song-item').forEach((item, i) => {
        item.querySelector('.rank-number').innerText = i + 1;
        // Auch hier beim Verschieben die Anzeige aktualisieren
        const displayLabel = (currentMode === 'live') ? `${livePoints[i] || 0} Pkt.` : `Rang ${i + 1}`;
        item.querySelector('.points-badge').innerText = displayLabel;
    });
}

async function submitVoting() {
    if(!confirm("Voting jetzt final absenden?")) return;
    
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerText = "Speichere...";

    try {
        const items = document.querySelectorAll('.song-item');
        const votesToUpload = [];
        const voterName = document.getElementById('username').value;



        // Wir nutzen eine Schleife für die Updates
        // Wir nutzen eine Schleife für die Updates
        for (let index = 0; index < items.length; index++) {
            const item = items[index];
            const songId = item.getAttribute('data-id');
            
            // Punktesystem (Hier angepasst an loadSongs)
            const livePoints = [15, 10, 8, 7, 6, 5, 4, 3, 2, 1];
            const prePoints  = [12, 10, 8, 7, 6, 5, 4, 3, 2, 1];
            const pointsMap = (currentMode === 'live') ? livePoints : prePoints;
            const points = pointsMap[index] || 0;

            // 1. Daten für die Historie (single_votes) sammeln
            votesToUpload.push({
                voter_name: voterName,
                id: songId, 
                points: points,
                mode: currentMode
            });

            // 2. Aktuelle Werte aus 'results' abrufen, um Summen zu bilden
            const { data: currentRes, error: fetchError } = await supabaseClient
                .from('results')
                .select('points_pre, points_live')
                .eq('id', songId)
                .single();

            if (fetchError) console.error("Fehler beim Abruf für ID " + songId, fetchError);

            // Aktuelle Werte sicher auslesen (0 falls leer)
            let pre = currentRes ? (currentRes.points_pre || 0) : 0;
            let live = currentRes ? (currentRes.points_live || 0) : 0;

            // Neue Punkte zur richtigen Spalte addieren
            if (currentMode === 'live') {
                live += points;
            } else {
                pre += points;
            }

            // Gesamtsumme berechnen
            const total = pre + live;

            // 3. Alle drei Spalten in 'results' gleichzeitig aktualisieren
            const { error: updateError } = await supabaseClient
                .from('results')
                .update({ 
                    points_pre: pre, 
                    points_live: live, 
                    points_all: total 
                })
                .eq('id', songId);

            if (updateError) throw updateError;
        }

        // 3. Alle Einzelstimmen in 'single_votes' eintragen
        const { error: voteError } = await supabaseClient.from('single_votes').insert(votesToUpload);
        if(voteError) throw voteError;

        // 4. Teilnehmer sperren
        if(currentMode === 'pre' && loggedInUserId) {
            await supabaseClient.from('participants').update({ vote_status: 'yes' }).eq('id', loggedInUserId);
        }

        alert("Erfolgreich abgesendet!");
        location.reload();

    } catch (err) {
        console.error("Vollständiger Fehler-Stack:", err);
        alert("Fehler beim Speichern: " + (err.message || "Unbekannter Datenbankfehler"));
        btn.disabled = false;
        btn.innerText = "Voting final absenden";
    }
}
    initApp();
</script>
</body>
</html>
