<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curovision Voting</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>
    <style>
        /* KRITISCH: Overlay für den Schnelldurchgang optimiert */
        .hidden { display: none !important; }
        
        #recap-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.98); /* Sehr dunkler Hintergrund */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Zentriert alles vertikal */
            z-index: 10000;
            margin: 0;
            padding: 0;
        }

        #recap-overlay h1 {
            margin-bottom: 5px;
            color: #00d2ff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        #recap-overlay p {
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        #recap-video {
            width: 90vw;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            border: 2px solid #00d2ff;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.2);
            margin-bottom: 25px;
        }

        #close-recap-btn {
            background: #00ff88;
            color: #121212;
            border: none;
            padding: 15px 50px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        #close-recap-btn:hover:not(:disabled) {
            transform: scale(1.05);
            background: #00ffa2;
        }

        #close-recap-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        /* Basis-Styles für die restliche Seite */
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(to bottom, #1a1a2e, #16213e); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 600px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 20px; }
        .title-logo { height: 70px; width: auto; object-fit: contain; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; background: white; color: #333; }
        button { background: #00d2ff; color: #121212; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        #song-list { margin-top: 20px; text-align: left; }
        .song-item { background: rgba(255, 255, 255, 0.1); margin: 8px 0; padding: 15px; border-radius: 10px; cursor: grab; display: flex; align-items: center; border-left: 5px solid #00d2ff; position: relative; }
        .rank-number { margin-right: 15px; font-weight: bold; color: #00d2ff; width: 25px; }
        .points-badge { position: absolute; right: 15px; color: #121212; font-weight: bold; padding: 5px 10px; border-radius: 5px; background: #00ff88; }
        .fi { margin-right: 5px; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 12px; margin-bottom: 10px;">
            <span id="status-dot" style="height: 10px; width: 10px; border-radius: 50%; display: inline-block; background-color: gray;"></span>
            <span id="status-text">Initialisiere...</span>
        </div>

        <div class="header-container">
            <img src="logo.png" alt="Logo" class="title-logo">
            <h1>CUROVISION VOTING</h1>
            <img src="logo.png" alt="Logo" class="title-logo">
        </div>
        
        <div id="login-area">
            <h3 id="mode-title">Lade...</h3>
            <input type="text" id="username" placeholder="Dein Name">
            <input type="password" id="userpassword" class="hidden" placeholder="Dein Passwort">
            <br>
            <button onclick="startVoting()">Anmelden</button>
        </div>

        <div id="voting-area" class="hidden">
            <h3>Hallo <span id="display-name"></span>!</h3>
            <p>Schiebe deine Favoriten auf die oberen Plätze:</p>
            <div id="song-list"></div>
            <button id="submit-btn" onclick="submitVoting()" style="background: #00ff88; margin-top: 30px; width: 100%;">Voting final absenden</button>
        </div>
    </div>

    <div id="recap-overlay" class="hidden">
        <h1>🎬 SCHNELLDURCHGANG</h1>
        <p>Bitte schau dir die Zusammenfassung an, bevor du abstimmst.</p>

        <iframe id="recap-video" src="" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                allowfullscreen></iframe>

        <button id="close-recap-btn" onclick="closeRecap()" disabled>
            Bitte warten... (<span id="recap-timer">30</span>s)
        </button>
    </div>

    <script>
    const SUPABASE_URL = 'https://gvrzwwobfgrrsdzqwcdy.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2cnp3d29iZmdycnNkenF3Y2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTc3NDksImV4cCI6MjA5MDc5Mzc0OX0.GJHIJD5IEaFD5Q1zPhTRSLr7-EoJhj5ZIqyi4vJJfSY';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentMode = '';
    let loggedInUserId = null;
    let recapInterval;
    let recapTimeLeft = 30;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    async function initApp() {
        const { data, error } = await supabaseClient.from('config').select('value').eq('key', 'voting_status').single();
        if (error) return;
        currentMode = data.value;
        document.getElementById('status-dot').style.backgroundColor = "#00ff88";
        document.getElementById('status-text').innerText = "Bereit (" + currentMode.toUpperCase() + ")";
        document.getElementById('mode-title').innerText = currentMode === 'pre' ? "PRE-VOTING" : "LIVE-VOTING";
        if(currentMode === 'pre') document.getElementById('userpassword').classList.remove('hidden');
    }

    async function startVoting() {
        const name = document.getElementById('username').value;
        if(!name) return alert("Bitte Namen eingeben!");

        if(currentMode === 'pre') {
            const pass = document.getElementById('userpassword').value;
            const { data, error } = await supabaseClient.from('participants').select('*').eq('name', name).eq('password', pass).single();
            if (!data || error) return alert("Login-Daten nicht korrekt!");
            if (data.vote_status === 'yes') return alert("Du hast bereits abgestimmt!");
            loggedInUserId = data.id;
            showRecap();
        } else {
            proceedToVoting(name);
        }
    }

    function showRecap() {
        const overlay = document.getElementById('recap-overlay');
        const iframe = document.getElementById('recap-video');
        const btn = document.getElementById('close-recap-btn');
        const timerDisplay = document.getElementById('recap-timer');

        // YouTube-ID hier anpassen falls nötig (5eZonu8XsEs)
        iframe.src = "https://www.youtube.com/embed/5eZonu8XsEs?autoplay=1";
        overlay.classList.remove('hidden');

        recapTimeLeft = 30;
        btn.disabled = true;
        btn.innerText = `Bitte warten... (${recapTimeLeft}s)`;

        clearInterval(recapInterval);
        recapInterval = setInterval(() => {
            recapTimeLeft--;
            timerDisplay.innerText = recapTimeLeft;

            if (recapTimeLeft <= 0) {
                clearInterval(recapInterval);
                btn.disabled = false;
                btn.innerText = "Verstanden! Zum Voting";
            } else {
                btn.innerText = `Bitte warten... (${recapTimeLeft}s)`;
            }
        }, 1000);
    }

    function closeRecap() {
        document.getElementById('recap-overlay').classList.add('hidden');
        document.getElementById('recap-video').src = ""; 
        const name = document.getElementById('username').value;
        proceedToVoting(name);
    }

    function proceedToVoting(name) {
        document.getElementById('login-area').classList.add('hidden');
        document.getElementById('voting-area').classList.remove('hidden');
        document.getElementById('display-name').innerText = name;
        loadSongs();
    }

    async function loadSongs() {
        const { data: songs } = await supabaseClient.from('songs').select('*');
        let filtered = (currentMode === 'pre') 
            ? songs.filter(s => Number(s.id) !== Number(loggedInUserId))
            : songs; // Hier Logik für Live-Voting-Elimination einfügen falls nötig
        
        filtered = shuffleArray(filtered);
        const list = document.getElementById('song-list');
        list.innerHTML = '';
        
        filtered.forEach((s, i) => {
            const item = document.createElement('div');
            item.className = 'song-item';
            item.setAttribute('data-id', s.id);
            const flagClass = s.country ? `fi fi-${s.country.toLowerCase()}` : '';
            item.innerHTML = `
                <span class="rank-number">${i+1}</span>
                <div class="song-info">
                    <strong>${s.title}</strong>
                    <small><span class="${flagClass}"></span> ${s.artist}</small>
                </div>
                <div class="points-badge">${currentMode === 'pre' ? 'Rang '+(i+1) : '+0 P.'}</div>
            `;
            list.appendChild(item);
        });

        new Sortable(list, { 
            animation: 150, 
            onEnd: updateBadges 
        });
    }

    function updateBadges() {
        document.querySelectorAll('.song-item').forEach((item, i) => {
            item.querySelector('.rank-number').innerText = i + 1;
            const badge = item.querySelector('.points-badge');
            if (currentMode === 'pre') badge.innerText = `Rang ${i + 1}`;
        });
    }
        
    async function submitVoting() {
        if (!confirm("Voting jetzt final absenden?")) return;
        alert("Simuliertes Absenden erfolgreich!");
        location.reload();
    }

    initApp();
</script>
</body>
</html>
