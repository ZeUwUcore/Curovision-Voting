<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curovision - Admin Results</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .hidden { display: none !important; }
        
        #lock-screen { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); text-align: center; margin-top: 100px; }
        input { padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; width: 200px; background: white; color: black; }
        button { background: #00d2ff; color: #121212; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00ff88; }
        
        .container { width: 100%; max-width: 900px; }
        h1 { color: #00d2ff; text-align: center; text-transform: uppercase; }
        .section-title { border-bottom: 2px solid rgba(0, 210, 255, 0.3); margin-top: 50px; color: #00ff88; }
        .voter-card { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .vote-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .leaderboard { background: rgba(255, 255, 255, 0.07); border-radius: 15px; overflow: hidden; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; }
        tr:nth-child(2) { color: #ffd700; font-weight: bold; } /* Erster Platz (nach Header) */
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2>🔒 Admin Bereich</h2>
        <p>Bitte Passwort eingeben, um Ergebnisse zu sehen:</p>
        <input type="password" id="admin-pass" placeholder="Passwort...">
        <br>
        <button id="unlock-btn" onclick="checkPass()">Freischalten</button>
    </div>

    <div id="main-content" class="container hidden">
        <h1>Curovision Results</h1>
        
        <div id="loader" style="text-align: center; padding: 50px;">Lade Daten...</div>
        
        <h2 class="section-title">Pre-Voting Abgaben</h2>
        <div id="pre-container"></div>

        <h2 class="section-title">Live-Voting Abgaben</h2>
        <div id="live-container"></div>

        <h1 style="margin-top: 80px;">Ranglisten</h1>
        <h2 class="section-title">1. Pre-Voting</h2>
        <div class="leaderboard"><table id="table-pre"></table></div>
        
        <h2 class="section-title">2. Live-Voting (nur Qualifizierte)</h2>
        <div class="leaderboard"><table id="table-live"></table></div>
        
        <h2 class="section-title">3. Gesamtergebnis</h2>
        <div class="leaderboard"><table id="table-all"></table></div>
    </div>

    <script>
    const SUPABASE_URL = 'https://gvrzwwobfgrrsdzqwcdy.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2cnp3d29iZmdycnNkenF3Y2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTc3NDksImV4cCI6MjA5MDc5Mzc0OX0.GJHIJD5IEaFD5Q1zPhTRSLr7-EoJhj5ZIqyi4vJJfSY';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function checkPass() {
        const userInput = document.getElementById('admin-pass').value;
        const btn = document.getElementById('unlock-btn');
        
        btn.innerText = "Prüfe...";
        btn.disabled = true;

        try {
            const { data, error } = await supabaseClient
                .from('config')
                .select('value')
                .eq('key', 'admin_password')
                .single();

            if (error) throw error;

            if (btoa(userInput) === data.value) {
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                fetchAllData();
            } else {
                alert("Falsches Passwort!");
                btn.innerText = "Freischalten";
                btn.disabled = false;
            }
        } catch (err) {
            console.error(err);
            alert("Fehler beim Login.");
            btn.innerText = "Freischalten";
            btn.disabled = false;
        }
    }

    async function fetchAllData() {
        try {
            const { data: votes } = await supabaseClient.from('single_votes').select('*');
            const { data: songs } = await supabaseClient.from('songs').select('*');
            const { data: results } = await supabaseClient.from('results').select('*');
            const { data: participants } = await supabaseClient.from('participants').select('id, name'); // Neu: Namen holen
            const { data: configData } = await supabaseClient.from('config').select('value').eq('key', 'elimination_count').single();
            
            const eliminationCount = configData ? parseInt(configData.value) : 0;

            // Teilnehmer-Mapping erstellen (ID -> Name)
            const participantMap = {};
            participants.forEach(p => {
                participantMap[Number(p.id)] = p.name;
            });

            const songMap = {};
            songs.forEach(s => {
                const sId = Number(s.id);
                songMap[sId] = { 
                    display: `${s.title} (${s.artist})`, 
                    voterName: participantMap[sId] || "Unbekannt", // Name aus Mapping ziehen
                    flag: s.country ? s.country.toLowerCase() : null,
                    qualified: String(s.qualified).toLowerCase().trim()
                };
            });

            // --- ELIMINATION LOGIK ---
            const virtualPoints = {}; 
            results.forEach(r => virtualPoints[Number(r.id)] = 0);

            const preVotes = (votes || []).filter(v => v.mode === 'pre');
            const voterGroups = preVotes.reduce((acc, v) => {
                if (!acc[v.voter_name]) acc[v.voter_name] = [];
                acc[v.voter_name].push(v);
                return acc;
            }, {});

            const escPoints = [12, 10, 8, 7, 6, 5, 4, 3, 2, 1];

            Object.values(voterGroups).forEach(userVotes => {
                userVotes.sort((a, b) => b.points - a.points);
                let pointer = 0;
                userVotes.forEach(v => {
                    const sId = Number(v.id);
                    if (songMap[sId] && songMap[sId].qualified !== 'yes' && pointer < escPoints.length) {
                        virtualPoints[sId] += escPoints[pointer];
                        pointer++;
                    }
                });
            });

            const losers = Object.keys(virtualPoints)
                .filter(id => songMap[Number(id)] && songMap[Number(id)].qualified !== 'yes')
                .map(id => ({ id: Number(id), pts: virtualPoints[id] }))
                .sort((a, b) => a.pts - b.pts);
            
            const eliminatedIds = losers.slice(0, eliminationCount).map(l => l.id);

            // --- RENDERING ---
            renderLeaderboard('table-pre', [...results].sort((a,b) => b.points_pre - a.points_pre), 'points_pre', songMap, eliminatedIds);
            renderLeaderboard('table-live', [...results].sort((a,b) => b.points_live - a.points_live), 'points_live', songMap, eliminatedIds);
            renderLeaderboard('table-all', [...results].sort((a,b) => b.points_all - a.points_all), 'points_all', songMap, eliminatedIds);

            // Vote Cards
            const grouped = (votes || []).reduce((acc, v) => {
                const key = `${v.voter_name}_${v.mode}`;
                if (!acc[key]) acc[key] = { name: v.voter_name, mode: v.mode, items: [] };
                acc[key].items.push(v);
                return acc;
            }, {});
            
            document.getElementById('pre-container').innerHTML = '';
            document.getElementById('live-container').innerHTML = '';
            renderVoteCards(Object.values(grouped), songMap);

            document.getElementById('loader').classList.add('hidden');
        } catch (err) {
            console.error("Admin-Fehler:", err);
        }
    }

    function renderVoteCards(groups, songMap) {
        const preCont = document.getElementById('pre-container');
        const liveCont = document.getElementById('live-container');
        groups.forEach(group => {
            const card = document.createElement('div');
            card.className = 'voter-card';
            group.items.sort((a, b) => b.points - a.points);
            const itemsHtml = group.items.map(v => {
                const s = songMap[v.id];
                const flagHtml = s && s.flag ? `<span class="fi fi-${s.flag}"></span> ` : '';
                // Hier auch das Format angepasst: Flagge [Name] Lied (Interpret)
                const displayText = s ? `${flagHtml}[${s.voterName}] ${s.display}` : `Song #${v.id}`;
                return `<div class="vote-item"><span>${displayText}</span><b>${v.points} Pkt.</b></div>`;
            }).join('');
            card.innerHTML = `<h3>${group.name} (${group.mode.toUpperCase()})</h3>${itemsHtml}`;
            if (group.mode === 'pre') preCont.appendChild(card);
            else liveCont.appendChild(card);
        });
    }

    function renderLeaderboard(tableId, sortedData, pointKey, songMap, eliminatedIds) {
        const table = document.getElementById(tableId);
        table.innerHTML = `<tr><th>#</th><th>Teilnehmer & Song</th><th>Punkte</th><th>Status</th></tr>`;
        
        let visibleRank = 1;
        const cleanEliminatedIds = eliminatedIds.map(id => Number(id));

        sortedData.forEach((res) => {
            const sId = Number(res.id);
            const s = songMap[sId];
            if(!s) return;
            
            const isEliminated = cleanEliminatedIds.includes(sId);
            if (tableId === 'table-live' && isEliminated) return;

            const row = table.insertRow();
            const flagHtml = s.flag ? `<span class="fi fi-${s.flag}"></span> ` : '';
            
            let statusText = "✅ WEITER";
            if (isEliminated) {
                statusText = "❌ RAUS";
                row.style.color = "#ff4d4d";
                row.style.opacity = "0.7";
            } else if (s.qualified === 'yes') {
                statusText = "⭐ FINALIST";
            }

            let pointsDisplay = res[pointKey]; 
            if (tableId === 'table-all' && res[pointKey] < 0) {
                pointsDisplay = `0 (${res[pointKey]})`;
            }

            row.innerHTML = `
                <td>${visibleRank}</td>
                <td style="${isEliminated ? 'text-decoration: line-through;' : ''}">
                    ${flagHtml}<strong>[${s.voterName}]</strong> ${s.display}
                </td>
                <td style="font-weight: bold;">${pointsDisplay}</td>
                <td>${statusText}</td>
            `;
            visibleRank++;
        });
    }
</script>
</body>
</html>
